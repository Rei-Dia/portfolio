 <h2>天橋立 </h2>
 <p>私は京都府北部にある天橋立がお気に入りの場所です。家からは少し遠いですが、景色がきれいで、風もよく通るので夏でも気持ちがいいからです。売店で販売しているソフトクリームもおすすめです。</p>
